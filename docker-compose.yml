services:
  stl-editor-pro:
    container_name: stl-editor-pro
    build:
      context: .
      dockerfile: Dockerfile
    image: stl-editor-pro:latest
    ports:
      - "3333:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - stl_network

networks:
  stl_network:
    driver: bridge
